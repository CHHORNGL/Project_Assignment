{% extends "layouts/base.html" %}
{% block title %}Add Rule{% endblock %}

{% block content %}
<div class="container-fluid" style="max-width:800px">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="font-weight-bold text-success">
            Create Diagnosis Rule
        </h3>

        <a href="{{ url_for('expert.knowledge_dashboard') }}"
           class="btn btn-light btn-sm shadow-sm">
            Back
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="POST">

                <div class="form-group">
                    <label class="font-weight-bold">Rule Name</label>
                    <input type="text"
                           name="name"
                           class="form-control"
                           placeholder="e.g. Early Blight Rule"
                           required>
                </div>

                <div class="form-group">
                    <label class="font-weight-bold">Disease</label>
                    <select name="disease_id"
                            class="form-control"
                            required>
                        <option value="">-- Select Disease --</option>
                        {% for d in diseases %}
                        <option value="{{ d.id }}">
                            {{ localize(d, "name") }}
                        </option>
                        {% else %}
                        <option value="" disabled>No diseases found</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label class="font-weight-bold">Symptoms</label>
                    <select name="symptoms"
                            class="form-control"
                            multiple
                            size="8"
                            required>
                        {% for s in symptoms %}
                        <option value="{{ s.id }}">{{ localize(s, "name") }}</option>
                        {% else %}
                        <option value="" disabled>No symptoms found</option>
                        {% endfor %}
                    </select>
                    <small class="text-muted">
                        Hold Ctrl (Windows) or Cmd (Mac) to select multiple symptoms.
                    </small>
                </div>

                <div class="form-group">
                    <label class="font-weight-bold">Confidence (0-1)</label>
                    <input type="number"
                           name="confidence"
                           class="form-control"
                           min="0"
                           max="1"
                           step="0.01"
                           placeholder="e.g. 0.85">
                </div>

                <div class="text-right mt-4">
                    <button class="btn btn-success px-4">
                        Save Rule
                    </button>
                    <a href="{{ url_for('expert.knowledge_dashboard') }}"
                       class="btn btn-secondary ml-2">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>

</div>
{% endblock %}
