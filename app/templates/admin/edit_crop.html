{% extends "layouts/base.html" %}
{% block title %}{{ t("edit_crop_title") }}{% endblock %}

{% block content %}
<div class="container-fluid col-md-6">

    <h4 class="mb-4">✏️ {{ t("edit_crop_title") }}</h4>

    <form method="POST">
        <div class="form-group">
            <label>{{ t("crop_name") }}</label>
            <input type="text" name="name"
                   value="{{ crop.name }}"
                   class="form-control" required>
        </div>

        <div class="form-group">
            <label>{{ t("crop_name_kh") }}</label>
            <input type="text" name="name_kh"
                   value="{{ crop.name_kh or '' }}"
                   class="form-control">
        </div>

        <div class="form-group">
            <label>{{ t("description_label") }}</label>
            <textarea name="description"
                      class="form-control">{{ crop.description }}</textarea>
        </div>

        <div class="form-group">
            <label>{{ t("description_kh") }}</label>
            <textarea name="description_kh"
                      class="form-control">{{ crop.description_kh or '' }}</textarea>
        </div>

        <button class="btn btn-primary">{{ t("update") }}</button>
        <a href="{{ url_for('admin.crops') }}"
           class="btn btn-secondary">{{ t("cancel") }}</a>
    </form>

</div>
{% endblock %}
