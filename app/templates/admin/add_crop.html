{% extends "layouts/base.html" %}
{% block title %}{{ t("add_crop") }}{% endblock %}

{% block content %}
<div class="container-fluid col-md-6">

    <h4 class="mb-4">➕ {{ t("add_new_crop") }}</h4>

    <form method="POST">
        <div class="form-group">
            <label>{{ t("crop_name") }}</label>
            <input type="text" name="name"
                   class="form-control" required>
        </div>

        <div class="form-group">
            <label>{{ t("crop_name_kh") }}</label>
            <input type="text" name="name_kh"
                   class="form-control">
        </div>

        <div class="form-group">
            <label>{{ t("description_label") }}</label>
            <textarea name="description"
                      class="form-control"></textarea>
        </div>

        <div class="form-group">
            <label>{{ t("description_kh") }}</label>
            <textarea name="description_kh"
                      class="form-control"></textarea>
        </div>

        <button class="btn btn-success">{{ t("save") }}</button>
        <a href="{{ url_for('admin.crops') }}"
           class="btn btn-secondary">{{ t("cancel") }}</a>
    </form>

</div>
{% endblock %}
