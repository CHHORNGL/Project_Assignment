{% extends "layouts/base.html" %}
{% block title %}{{ t("edit_crop_title") }}{% endblock %}

{% block content %}
<div class="container-fluid" style="max-width:700px">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="font-weight-bold text-gray-800">
            <i class="fas fa-edit text-success mr-2" aria-hidden="true"></i>{{ t("edit_crop_title") }}
        </h3>

        <a href="{{ url_for('admin.crops') }}"
           class="btn btn-light btn-sm shadow-sm">
            <i class="fas fa-arrow-left mr-1" aria-hidden="true"></i>{{ t("back") }}
        </a>
    </div>

    <!-- Form Card -->
    <div class="card shadow-sm">
        <div class="card-body">

            <form method="POST">

                <!-- {{ t("crop_name") }} -->
                <div class="form-group">
                    <label class="font-weight-bold">
                        {{ t("crop_name") }}
                    </label>
                    <input type="text"
                           name="name"
                           class="form-control"
                           value="{{ crop.name }}"
                           required>
                </div>

                <!-- {{ t("description_label") }} -->
                <div class="form-group">
                    <label class="font-weight-bold">
                        {{ t("description_label") }}
                    </label>
                    <textarea name="description"
                              class="form-control"
                              rows="4"
                              placeholder="{{ t("crop_description_optional") }}">{{ crop.description }}</textarea>
                </div>

                <!-- Actions -->
                <div class="mt-4">
                    <button type="submit"
                            class="btn btn-success">
                        <i class="fas fa-save mr-1" aria-hidden="true"></i>{{ t("save_changes") }}
                    </button>

                    <a href="{{ url_for('admin.crops') }}"
                       class="btn btn-secondary ml-2">
                        Cancel
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>
{% endblock %}
