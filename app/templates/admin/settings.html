{% extends "admin/dashboard.html" %}

{% block content %}
<div class="container-fluid py-4">
    <h1 class="h3 mb-4 text-gray-800 font-weight-bold">{{ t("settings") }}</h1>

    <div class="row">
        <div class="col-lg-6">
            <div class="card shadow-sm border-0 rounded-xl mb-4">
                <div class="card-header bg-white py-3">
                    <h6 class="m-0 font-weight-bold text-success">{{ t("maintenance") }}</h6>
                </div>
                <div class="card-body">
                    <p class="text-muted small">{{ t("maintenance_desc") }}</p>
                    
                    <form action="{{ url_for('admin.clean_data') }}" method="POST" onsubmit="return confirm('{{ t(\"confirm_clean_data\") }}')">
                        <button type="submit" class="btn btn-danger btn-icon-split rounded-pill">
                            <span class="icon text-white-50"><i class="fas fa-broom"></i></span>
                            <span class="text">{{ t("clean_corrupted_data") }}</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card shadow-sm border-0 rounded-xl mb-4">
                <div class="card-header bg-white py-3">
                    <h6 class="m-0 font-weight-bold text-primary">{{ t("admin_account") }}</h6>
                </div>
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <img class="img-profile rounded-circle mr-3" width="60" src="{{ url_for('static', filename='sb-admin/img/undraw_profile.svg') }}">
                        <div>
                            <h5 class="mb-0 font-weight-bold">{{ t("admin_user") }}</h5>
                            <span class="text-muted small">{{ t("admin_role_label") }}</span>
                        </div>
                    </div>
                    <button class="btn btn-light btn-sm rounded-pill px-3 border">{{ t("change_password") }}</button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .rounded-xl { border-radius: 16px !important; }
    .btn-danger { background-color: #e74a3b; border: none; }
</style>
{% endblock %}
