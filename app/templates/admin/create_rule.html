{% extends "layouts/base.html" %}
{% block title %}{{ t("create_rule_title") }}{% endblock %}

{% block content %}
<div class="container-fluid" style="max-width:700px">

<h3>
    <i class="fas fa-project-diagram text-success mr-2" aria-hidden="true"></i>{{ t("create_diagnosis_rule") }}
</h3>

<form method="POST">

    <div class="form-group">
        <label>{{ t("rule_name") }}</label>
        <input name="name" class="form-control" required>
    </div>

    <div class="form-group">
        <label>{{ t("disease_label") }}</label>
        <select name="disease_id" class="form-control" required>
            {% for d in diseases %}
            <option value="{{ d.id }}">
                {{ d.name_kh if current_lang == 'km' and d.name_kh else d.name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label>{{ t("symptoms_comma") }}</label>
        <textarea name="symptoms"
                  class="form-control"
                  rows="3"
                  placeholder="{{ t("symptoms_placeholder") }}"
                  required></textarea>
    </div>

    <div class="form-group">
        <label>Confidence (0–1)</label>
        <input name="confidence"
               type="number"
               step="0.1"
               class="form-control"
               value="0.8">
    </div>

    <button class="btn btn-success">{{ t("save") }}</button>
    <a href="{{ url_for('admin.rules_engine') }}"
       class="btn btn-secondary ml-2">{{ t("cancel") }}</a>

</form>

</div>
{% endblock %}
