{% extends "layouts/base.html" %}
{% block title %}{{ t("manage_permissions") }}{% endblock %}

{% block content %}
<div class="container-fluid">

    <!-- ===============================
         PAGE TITLE
    =============================== -->
    <div class="d-flex align-items-center mb-4">
        <i class="fas fa-user-shield mr-2 text-success" style="font-size:20px;"></i>
        <h1 class="h4 mb-0 font-weight-bold">
            Manage Permissions – {{ role.name | upper }}
        </h1>
    </div>

    <form method="POST" class="col-md-8 p-0">

        <div class="card shadow-sm">
            <div class="card-body">

                <!-- ===============================
                     PERMISSIONS LIST
                =============================== -->
                {% for perm in permissions %}
                <label class="permission-item d-flex align-items-center mb-3">

                    <!-- REAL CHECKBOX (hidden safely) -->
                    <input type="checkbox"
                           class="permission-checkbox"
                           name="permissions"
                           value="{{ perm.id }}"
                           {% if perm in role.permissions %}checked{% endif %}>

                    <!-- CUSTOM CHECK UI -->
                    <span class="permission-box"></span>

                    <!-- TEXT -->
                    <div class="ml-3">
                        <div class="font-weight-bold">
                            {{ perm.code }}
                        </div>
                        <div class="text-muted small">
                            {{ perm.name }}
                        </div>
                    </div>

                </label>
                {% endfor %}

                <!-- ===============================
                     ACTION BUTTONS
                =============================== -->
                <div class="mt-4">
                    <button type="submit" class="btn btn-success mr-2">
                        💾 {{ t("save_permissions") }}
                    </button>

                    <a href="{{ url_for('admin.roles') }}"
                       class="btn btn-secondary">
                        {{ t("cancel") }}
                    </a>
                </div>

            </div>
        </div>

    </form>

</div>

<!-- ===============================
     LOCAL SAFE STYLE
=============================== -->
<style>
.permission-item {
    cursor: pointer;
}

/* Hide checkbox but keep it functional */
.permission-checkbox {
    position: absolute;
    opacity: 0;
    pointer-events: none;
}

/* Custom checkbox */
.permission-box {
    width: 18px;
    height: 18px;
    border-radius: 6px;
    border: 2px solid #22c55e;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
}

/* Checked state */
.permission-checkbox:checked + .permission-box {
    background-color: #22c55e;
}

.permission-checkbox:checked + .permission-box::after {
    content: "✓";
    color: white;
    font-size: 12px;
    font-weight: bold;
}
</style>

{% endblock %}
