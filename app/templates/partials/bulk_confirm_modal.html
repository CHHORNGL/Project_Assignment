<div class="modal fade" id="{{ modal_id }}" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="{{ modal_title_id }}">{{ modal_title }}</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body" id="{{ modal_body_id }}"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" id="{{ modal_copy_id }}">{{ t("copy_preview") }}</button>
                <button type="button" class="btn btn-secondary" data-dismiss="modal">{{ t("cancel") }}</button>
                <button type="button" class="btn btn-danger" id="{{ modal_confirm_id }}">{{ t("confirm") }}</button>
            </div>
        </div>
    </div>
</div>
