<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
<meta charset="UTF-8">
<title>{% block title %}Agri Expert System{% endblock %}</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ===============================
     GOOGLE FONTS
=============================== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700&family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- ===============================
     FONT AWESOME
=============================== -->
<link href="{{ url_for('static', filename='sb-admin/vendor/fontawesome-free/css/all.min.css') }}" rel="stylesheet">

<!-- ===============================
     SB ADMIN
=============================== -->
<link href="{{ url_for('static', filename='sb-admin/css/sb-admin-2.min.css') }}" rel="stylesheet">

<!-- ===============================
     CUSTOM STYLE
=============================== -->
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

<!-- ===============================
     GLOBAL TYPOGRAPHY
=============================== -->
<style>
:root {
    --font-en: "Inter", system-ui, sans-serif;
    --font-kh: "Kantumruy Pro", "Noto Sans Khmer", "Khmer OS", sans-serif;
}
* { font-family: var(--font-en), var(--font-kh); }
body { font-size: .95rem; line-height: 1.6; }
h1,h2,h3,h4,h5,h6 { font-weight: 600; }
.kh { font-family: var(--font-kh) !important; }
</style>

{% block head %}{% endblock %}

<!-- ===============================
     🌗 NO-FLASH THEME LOADER
     Priority: DB → localStorage → OS
=============================== -->
<script>
(function () {
    const userTheme = "{{ current_user.theme if current_user.is_authenticated else 'system' }}";
    const storedTheme = localStorage.getItem("theme");

    function prefersDark() {
        return window.matchMedia("(prefers-color-scheme: dark)").matches;
    }

    function applyTheme(theme) {
        document.documentElement.classList.remove("dark-mode");
        if (theme === "dark") document.documentElement.classList.add("dark-mode");
        if (theme === "system" && prefersDark()) document.documentElement.classList.add("dark-mode");
    }

    if (userTheme && userTheme !== "system") applyTheme(userTheme);
    else if (storedTheme) applyTheme(storedTheme);
    else applyTheme("system");

    if (userTheme === "system" || storedTheme === "system") {
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", e => {
            document.documentElement.classList.toggle("dark-mode", e.matches);
        });
    }
})();
</script>
</head>

<body id="page-top" class="app-shell {{ body_class|default('') }}">
<div id="wrapper">

{% include "layouts/sidebar.html" %}

<div id="content-wrapper" class="d-flex flex-column">
<div id="content">

{% set page_title = self.title() %}
{% include "layouts/topbar.html" %}

<div class="container-fluid pt-3">
{% block content %}{% endblock %}
</div>

</div>
{% include "layouts/footer.html" %}
</div>
</div>

<!-- ===============================
     JS
=============================== -->
<script src="{{ url_for('static', filename='sb-admin/vendor/jquery/jquery.min.js') }}"></script>
<script src="{{ url_for('static', filename='sb-admin/vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static', filename='sb-admin/js/sb-admin-2.min.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ===============================
     🌗 THEME SWITCH HANDLER
=============================== -->
<script>
document.querySelectorAll(".theme-option[data-theme]").forEach(btn => {
    btn.addEventListener("click", async () => {
        const theme = btn.dataset.theme;

        document.documentElement.classList.remove("dark-mode");
        if (theme === "dark") document.documentElement.classList.add("dark-mode");
        if (theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            document.documentElement.classList.add("dark-mode");
        }

        localStorage.setItem("theme", theme);

        try {
            await fetch("/users/theme", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ theme })
            });
        } catch (e) {}
    });
});
</script>

<!-- ===============================
     🌐 LANGUAGE SWITCH HANDLER
=============================== -->
<script>
document.querySelectorAll(".lang-option[data-lang]").forEach(btn => {
    btn.addEventListener("click", async () => {
        const language = btn.dataset.lang;
        try {
            await fetch("/users/language", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ language })
            });
        } catch (e) {}
        window.location.reload();
    });
});
</script>

{% block scripts %}{% endblock %}

</body>
</html>
